<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Qué miramo? | Mi relación con YouTube</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --background: #f8f9fc;
      --foreground: #1a1d2e;
      --card: #ffffff;
      --primary: #e54d4d;
      --muted: #e8eaf0;
      --muted-foreground: #6b7280;
      --border: #e2e4eb;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--background);
      color: var(--foreground);
    }

    .font-heading { font-family: 'Space Grotesk', sans-serif; }

    .hero {
      padding: 80px 20px;
      text-align: center;
    }

    .hero-title {
      font-size: 3rem;
      font-weight: 700;
    }

    .hero-description {
      margin-top: 10px;
      color: var(--muted-foreground);
    }

    .main-content {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .charts-container {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .chart-card {
      background: white;
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .chart-header {
      padding: 20px;
    }

    .chart-title {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .chart-description {
      font-size: 0.95rem;
      color: var(--muted-foreground);
    }

    .chart-content {
      padding: 20px;
    }

    .tableauPlaceholder {
      width: 100%;
      min-height: 700px;
    }

  </style>
</head>

<body>

<header class="hero">
  <h1 class="hero-title font-heading">¿Qué miramo?</h1>
  <p class="hero-description">Mi relación con YouTube</p>
</header>

<main class="main-content">
  <div class="charts-container">

    <!-- CHART 1 -->
    <section class="chart-card">
      <div class="chart-header">
        <h2 class="chart-title">¿Qué tipo de contenido consumo?</h2>
        <p class="chart-description">Distribución por categoría</p>
      </div>
      <div class="chart-content">
        <div class="flourish-embed" data-src="visualisation/28160412">
          <script src="https://public.flourish.studio/resources/embed.js"></script>
        </div>
      </div>
    </section>

    <!-- CHART 2 -->
    <section class="chart-card">
      <div class="chart-header">
        <h2 class="chart-title">¿Qué días miro más YouTube?</h2>
        <p class="chart-description">Consumo semanal</p>
      </div>
      <div class="chart-content">

        <div class="tableauPlaceholder" id="viz1">
          <object class="tableauViz" style="display:none;">
            <param name="host_url" value="https://public.tableau.com/">
            <param name="name" value="Masgraficos/Dashboard2">
          </object>
        </div>

      </div>
    </section>

    <!-- CHART 3 NUEVO -->
    <section class="chart-card">
      <div class="chart-header">
        <h2 class="chart-title">Video Viewed by channel</h2>
        <p class="chart-description">Distribución por canal</p>
      </div>
      <div class="chart-content">

        <div class="tableauPlaceholder" id="viz2">
          <object class="tableauViz" style="display:none;">
            <param name="host_url" value="https://public.tableau.com/">
            <param name="name" value="otrografico/Dashboard1">
          </object>
        </div>

      </div>
    </section>

  </div>
</main>

<script src="https://public.tableau.com/javascripts/api/viz_v1.js"></script>

<script>
function resizeViz(viz, el) {
  if (window.innerWidth > 900) {
    viz.style.height = "900px";
  } else {
    viz.style.height = "700px";
  }
  viz.style.width = "100%";
}

function initViz(id) {
  const div = document.getElementById(id);
  const viz = div.getElementsByTagName("object")[0];
  resizeViz(viz);
  window.addEventListener("resize", () => resizeViz(viz));
}

initViz("viz1");
initViz("viz2");
</script>

</body>
</html>
